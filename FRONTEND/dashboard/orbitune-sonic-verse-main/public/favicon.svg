<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6f61;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd60a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#000000"/>
  
  <!-- Outer orbit ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  
  <!-- Inner orbit ring -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Headphone band (smooth arc connecting ear cups) -->
  <path d="M 18 34 Q 18 18, 32 15 Q 46 18, 46 34" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Left ear cup (circular) -->
  <circle cx="18" cy="36" r="5" fill="none" stroke="url(#grad1)" stroke-width="2.5"/>
  <circle cx="18" cy="36" r="3" fill="url(#grad1)" opacity="0.6"/>
  
  <!-- Right ear cup (circular) -->
  <circle cx="46" cy="36" r="5" fill="none" stroke="url(#grad1)" stroke-width="2.5"/>
  <circle cx="46" cy="36" r="3" fill="url(#grad1)" opacity="0.6"/>
  
  <!-- Sound waves from left cup -->
  <path d="M 12 36 Q 8 36, 6 36" fill="none" stroke="#ff6f61" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 10 32 Q 6 32, 4 32" fill="none" stroke="#6c63ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Sound waves from right cup -->
  <path d="M 52 36 Q 56 36, 58 36" fill="none" stroke="#ff6f61" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 54 32 Q 58 32, 60 32" fill="none" stroke="#6c63ff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Orbital particles -->
  <circle cx="32" cy="8" r="1.5" fill="#ffd60a" opacity="0.8"/>
  <circle cx="50" cy="20" r="1" fill="#ff6f61" opacity="0.6"/>
  <circle cx="54" cy="44" r="1.5" fill="#6c63ff" opacity="0.7"/>
  <circle cx="14" cy="48" r="1" fill="#ffd60a" opacity="0.6"/>
  <circle cx="10" cy="22" r="1.5" fill="#ff6f61" opacity="0.8"/>
</svg>
